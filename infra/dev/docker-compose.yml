services:
  db:
    image: postgres:15-alpine
    container_name: bti_postgres_dev
    environment:
      POSTGRES_USER: bti_root
      POSTGRES_PASSWORD: bti_dev
      POSTGRES_DB: bti_database
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bti_root -d bti_database"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ../../
      dockerfile: infra/dev/Dockerfile
    container_name: bti_app_dev
    environment:
      # Connect using the compose service name "db" instead of "localhost"
      APP_DATABASE_URL: "postgres://bti_root:bti_dev@db:5432/bti_database"
      # Other variables can also go here
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_dev_data:
